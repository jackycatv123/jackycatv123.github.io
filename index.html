<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>林明治的個人網站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #1a1a2e 0%, #FFFFFF 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        .avatar {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 4px solid #FFFFFF;
            margin-bottom: 20px;
            background: #FFFFFF;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: auto;
            margin-right: auto;
            font-size: 60px;
        }

        h1 {
            color: #9CF527;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .tagline {
            color: #a0a0a0;
            font-size: 1.2em;
        }

        .section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h2 {
            color: #9CF527;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #FFFFFF;
        }

        p {
            color: #d0d0d0;
            margin-bottom: 15px;
        }


        .links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .links a {
            color: #9CF527;
            text-decoration: none;
            padding: 12px 24px;
            border: 2px solid #9CF527;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .links a:hover {
            background: #9CF527;
            color: #1a1a2e;
        }

       

        footer {
            text-align: center;
            color: #666;
            margin-top: 60px;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="avatar">
                <img
                  src="https://scontent-tpe1-1.xx.fbcdn.net/v/t39.30808-6/632830419_3391813790977721_470696220160917892_n.jpg?stp=dst-jpg_tt6&cstp=mx2045x2048&ctp=s2045x2048&_nc_cat=111&ccb=1-7&_nc_sid=6ee11a&_nc_ohc=-ZqCAalNdwYQ7kNvwG6Htgx&_nc_oc=AdrP31yppqnt_Azjdihu2enMAR9ZHUkvcWD_CJl9i9oGDtohk2lB2fK5zgr_bdE5onY&_nc_zt=23&_nc_ht=scontent-tpe1-1.xx&_nc_gid=TGH06hMaFaU9UqaladH8zA&_nc_ss=7b2a8&oh=00_AQDyYrulg8VNxDkcfas7lVqLTNcP_a_7u8D-YZ9m5jH_og&oe=6A5A52CC"
                  alt="Moon and Tree"
                  width="200"
                  height="200" />
            </div>
            <h1>林明治</h1>
            <div class="links">
                <a href="https://github.com/jackycatv123" target="_blank">GitHub</a>
                <a href="https://linkedin.com/in/明治-林-2b9713353" target="_blank">LinkedIn</a>
                <a href="mailto:jackycatv123@gmail.com">Email</a>
            </div>
        </header>

        <section class="section">
            <h2>About Me</h2>
            <p>
                嗨！我是三重人。
            </p>
            <p>
                我的網站首頁。
            </p>
        </section>



        <footer>
            <p>© 2026 林明治. Built with ❤️ and hosted on GitHub Pages.</p>
        </footer>
    </div>
</body>
</html>
